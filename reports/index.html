<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverydAI Labs — Daily Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #0d111c;
            color: #e0e0e0;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0066ff, #00d084);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #b0b0b0;
            margin-bottom: 40px;
            font-size: 14px;
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .report-card {
            background: #1a1f3a;
            border: 1px solid #2a2f4a;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .report-card:hover {
            border-color: #0066ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.15);
        }

        .report-date {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0066ff;
        }

        .report-type {
            font-size: 12px;
            color: #00d084;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .report-summary {
            font-size: 13px;
            color: #b0b0b0;
            line-height: 1.5;
        }

        .no-reports {
            text-align: center;
            padding: 60px 20px;
            color: #b0b0b0;
        }

        .footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #2a2f4a;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Daily Reports</h1>
        <p class="subtitle">EverydAI Labs — Autonomous Agent Operations</p>

        <div id="reports-container">
            <div class="no-reports">
                <p>No reports generated yet. Check back soon!</p>
            </div>
        </div>

        <div class="footer">
            <p>Reports are generated daily at 6:00 AM UTC. Also delivered via email to contact@everydailabs.com.</p>
            <p>Refresh page to load latest reports.</p>
        </div>
    </div>

    <script>
        // This will be populated by report generation script
        // Reports are stored as JSON files in the reports directory
        fetch('reports.json')
            .then(response => response.json())
            .catch(() => {
                // No reports yet, placeholder already shown
            });
    </script>
</body>
</html>
