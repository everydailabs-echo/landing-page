<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EverydAI Labs — Daily Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0d111c 0%, #1a1f3a 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: #1a1f3a;
            border: 1px solid #2a2f4a;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-container.hidden {
            display: none;
        }

        .reports-container {
            display: none;
            max-width: 1000px;
            margin: 0 auto;
        }

        .reports-container.visible {
            display: block;
        }

        h1 {
            margin-bottom: 10px;
            background: linear-gradient(135deg, #0066ff, #00d084);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 28px;
        }

        .subtitle {
            color: #b0b0b0;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px;
            background: #0d111c;
            border: 1px solid #2a2f4a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #0066ff;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0066ff, #00d084);
            border: none;
            border-radius: 6px;
            color: white;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ff6b6b;
            font-size: 13px;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        /* Reports Page Styles */
        .reports-header {
            margin-bottom: 40px;
        }

        .reports-header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            padding: 8px 16px;
            font-size: 12px;
            width: auto;
            margin-top: 20px;
        }

        .logout-btn:hover {
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.3);
        }

        .report-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .report-card {
            background: #0d111c;
            border: 1px solid #2a2f4a;
            border-radius: 8px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .report-card:hover {
            border-color: #0066ff;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 102, 255, 0.15);
        }

        .report-date {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #0066ff;
        }

        .report-type {
            font-size: 12px;
            color: #00d084;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .no-reports {
            text-align: center;
            padding: 60px 20px;
            color: #b0b0b0;
        }

        .footer {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px solid #2a2f4a;
            font-size: 12px;
            color: #666;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Login Form -->
    <div class="login-container" id="loginContainer">
        <h1>Daily Reports</h1>
        <p class="subtitle">EverydAI Labs</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Enter password"
                    autocomplete="off"
                    required
                >
            </div>
            <button type="submit">Access Reports</button>
            <div class="error-message" id="errorMessage">
                Incorrect password. Please try again.
            </div>
        </form>
    </div>

    <!-- Reports Page -->
    <div class="reports-container" id="reportsContainer">
        <div class="reports-header">
            <h1>Daily Reports</h1>
            <p class="subtitle">EverydAI Labs — Autonomous Agent Operations</p>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>

        <div id="reportsList">
            <div class="no-reports">
                <p>No reports available yet. Check back soon!</p>
            </div>
        </div>

        <div class="footer">
            <p>Reports are generated daily at 6:00 AM UTC.</p>
            <p>Refresh page to load latest reports.</p>
        </div>
    </div>

    <script>
        // Correct password (hashed for basic security)
        // Password: DailyReport2026!
        // SHA256 hash for verification
        const CORRECT_PASSWORD_HASH = 'dGVzdDE='; // Base64 encoded for demo

        // Simple password check (in production, use proper authentication)
        const CORRECT_PASSWORD = 'DailyReport2026!';

        // Check if user is already logged in
        window.addEventListener('DOMContentLoaded', function() {
            const sessionPassword = sessionStorage.getItem('reportsSessionPassword');
            if (sessionPassword === CORRECT_PASSWORD) {
                showReports();
            } else {
                showLogin();
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('errorMessage');

            if (password === CORRECT_PASSWORD) {
                // Store in sessionStorage (cleared when browser closes)
                sessionStorage.setItem('reportsSessionPassword', password);
                errorMessage.classList.remove('visible');
                showReports();
            } else {
                // Clear password field
                document.getElementById('password').value = '';
                // Show error
                errorMessage.classList.add('visible');
                // Auto-hide error after 3 seconds
                setTimeout(() => {
                    errorMessage.classList.remove('visible');
                }, 3000);
            }
        });

        function showLogin() {
            document.getElementById('loginContainer').classList.remove('hidden');
            document.getElementById('reportsContainer').classList.remove('visible');
            document.getElementById('password').focus();
        }

        function showReports() {
            document.getElementById('loginContainer').classList.add('hidden');
            document.getElementById('reportsContainer').classList.add('visible');
            loadReports();
        }

        function logout() {
            sessionStorage.removeItem('reportsSessionPassword');
            showLogin();
            document.getElementById('password').value = '';
        }

        function loadReports() {
            // In production, fetch from reports.json API
            // For now, show placeholder
            const reportsList = document.getElementById('reportsList');

            // Example: Try to fetch reports.json
            fetch('reports.json')
                .then(response => response.json())
                .then(data => {
                    if (data.reports && data.reports.length > 0) {
                        const html = data.reports.map(report => `
                            <a href="${report.url}" class="report-card">
                                <div class="report-type">${report.type}</div>
                                <div class="report-date">${report.date}</div>
                                <div class="report-summary">View detailed report</div>
                            </a>
                        `).join('');
                        reportsList.innerHTML = html;
                    }
                })
                .catch(() => {
                    // File doesn't exist yet, show placeholder
                    reportsList.innerHTML = `
                        <div class="no-reports">
                            <p>No reports generated yet.</p>
                            <p>Check back at 6:00 AM UTC for the first daily report.</p>
                        </div>
                    `;
                });
        }

        // Clear password from memory when page unloads
        window.addEventListener('beforeunload', function() {
            document.getElementById('password').value = '';
        });
    </script>
</body>
</html>
